{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center fw-bold mb-4">Welcome Back</h3>
                
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">College Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Login</button>
                </form>
                
                <div class="text-center mt-3">
                    <p class="mb-0 text-muted">New here? <a href="/register" class="text-decoration-none fw-bold">Create an account</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
